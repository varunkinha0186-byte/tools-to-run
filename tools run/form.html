<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
  <style>
    body {
          
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSWT5v6fVeRcBT-fUdPT3sTQnpmxpYELzuEJrPhlejlnw&s=10'); 
            
            background-repeat: no-repeat; 
            
            background-size: cover; 
            
            background-position: center; 
            
            background-attachment: fixed; 
          }
  </style>
  <style>
    input[type="submit"] {
      width: 150px;      
      height: 50px;      
      font-size: 18px;    
      padding: 10px;     
    }
  </style>
</head>

<body style="background-color:white; color:rgb(221, 20, 20);">

<form action="https://formsubmit.co/varunkinha0186@gmail.com" method="POST">
    <h1>ENTER YOUR NAME :</h1>
    <label for="username"></label>
    <br>
    <input type="text" id="username" name="username" placeholder="Your name here">
    <br>
    <h1>if you is studing in school then fill your class and subject otherwise sumbit your name :</h1>
    <label for="1">
    <input type="radio" value="class 11th" name="class" id="1"/>11th class
    </label>
    <br>
    <label for="2">
    <input type="radio" value="class 10th" name="class" id="2"/>10th class
    </label>
    <br>
    <label for="3">
      <input type="radio" value="class 12th" name="class" id="3"/>12th class
    </label>
    <br>
    <label for="4">
      <input type="radio" value="class 9th" name="class" id="4"/>9th class
    </label>
    <br>
    <br>
    <span style="color:blueviolet">
    <h1>choose your subject</h1>

    <input type="radio" id="medical" name="stream" value="Medical">
    <label for="medical">Medical</label><br>

    <input type="radio" id="nonmedical" name="stream" value="Non-Medical">
    <label for="nonmedical">Non-Medical</label><br>

    <input type="radio" id="commerce" name="stream" value="Commerce">
    <label for="commerce">Commerce</label><br>

    <input type="radio" id="arts" name="stream" value="Arts">
    <label for="arts">Arts</label><br>
    <hr>
    <h1>other subject</h1>
    <input type="checkbox" id="hindi" name="language[]" value="Hindi">
    <label for="hindi">Hindi</label><br>
    <br>

    <input type="checkbox" id="english" name="language[]" value="English">
    <label for="english">English</label><br>
    <br>

      <span style="color:rgb(255, 106, 0)">
    <h1>optional subject</h1>

    <input type="checkbox" id="finearts" name="additional_subjects[]" value="Fine Arts">
    <label for="finearts">Fine Arts</label><br>

    <input type="checkbox" id="computer" name="additional_subjects[]" value="Computer">
    <label for="computer">Computer</label><br>

    <input type="checkbox" id="maths" name="additional_subjects[]" value="Maths">
    <label for="maths">Maths</label><br>

    <input type="checkbox" id="bio" name="additional_subjects[]" value="Biology">
    <label for="bio">Biology</label><br>

    <input type="checkbox" id="phe" name="additional_subjects[]" value="Physical Health and Education">
    <label for="phe">Physical Health & Education</label><br>

    <input type="checkbox" id="sports" name="additional_subjects[]" value="Sports">
    <label for="sports">Sports</label><br>

    <input type="checkbox" id="agriculture" name="additional_subjects[]" value="Agriculture">
    <label for="agriculture">Agriculture</label><br>
    </span>
    <hr>
    <br>
    <span style="color:chartreuse">
    <br>
    <p>give feedback :-</p>
    <br>
    <textarea name="feedback" id="1" placeholder="plz give your feedback here" rows="9"></textarea>
    </span>
    <hr>
    <br>
    <br>
    <!DOCTYPE html>
    <h1>enter your date of birth</h1>
    <br>
    <label for="year">Year:</label>
    <select id="year" name="year">
      <h1>Select Year</h>
      
      <option value="2005">2005</option>
      <option value="2006">2006</option>
      <option value="2007">2007</option>
      <option value="2008">2008</option>
      <option value="2009">2009</option>
      <option value="2010">2010</option>
      <option value="2011">2011</option>
      <option value="2012">2012</option>
    </select>
    <br><br>
    <h1>select month</h1>
    <label for="month">Month:</label>
    <input type="number" id="month" name="month" min="1" max="12" placeholder="MM">
    <br><br>
    <h1>date</h1>
    <label for="day">Day:</label>
    <input type="number" id="day" name="day" min="1" max="31" placeholder="DD">
    <br><br>
    <br>
    <div style="text-align: center;">
    <input type="submit" value="submit">
    </div>
    
    <br>
    <br>
    <br>
    <br>
    <hr>
</form>
</body>
</html>

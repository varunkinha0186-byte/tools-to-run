<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #121212;
            padding: 10px;
        }
        .calculator {
            width: 100%;
            max-width: 480px;
            background-color: #202020;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }
        #display {
            width: 100%;
            height: 90px;
            background-color: #121212;
            color: #ffffff;
            font-size: 2.2rem;
            text-align: right;
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            margin-bottom: 20px;
            outline: none;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }
        button {
            padding: 18px 5px;
            font-size: 1.2rem;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            background-color: #333333;
            color: #ffffff;
            transition: background-color 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        button:active {
            background-color: #555555;
        }
        button.sci {
            background-color: #2d3748;
            color: #a0aec0;
            font-size: 1.1rem;
        }
        button.sci:active {
            background-color: #4a5568;
        }
        button.operator {
            background-color: #ff9500;
            color: #ffffff;
        }
        button.operator:active {
            background-color: #e08500;
        }
        button.clear {
            background-color: #a5a5a5;
            color: #000000;
        }
        button.clear:active {
            background-color: #8e8e8e;
        }
    </style>
</head>
<hr>
<body>
<div class="calculator">
    <input type="text" id="display" readonly placeholder="0">
    <div class="buttons">
        <!-- Row 1 -->
        <button class="sci" onclick="scientific('sin')">sin</button>
        <button class="sci" onclick="scientific('cos')">cos</button>
        <button class="sci" onclick="scientific('tan')">tan</button>
        <button class="sci" onclick="scientific('log')">log</button>
        <button class="clear" onclick="backspace()">⌫</button>

        <!-- Row 2 -->
        <button class="sci" onclick="scientific('sqrt')">√</button>
        <button class="sci" onclick="appendValue('**')">xʸ</button>
        <button class="sci" onclick="scientific('pi')">π</button>
        <button class="sci" onclick="scientific('e')">e</button>
        <button class="clear" onclick="clearDisplay()">AC</button>
        
        <!-- Row 3 -->
        <button onclick="appendValue('(')">(</button>
        <button onclick="appendValue(')')">)</button>
        <button onclick="appendValue('%')">%</button>
        <button class="operator" onclick="appendValue('/')">/</button>
        <button class="operator" onclick="appendValue('*')">×</button>
        
        <!-- Row 4 -->
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('-')">-</button>
        <button class="operator" style="grid-row: span 2; height: 100%;" onclick="calculate()">=</button>
        
        <!-- Row 5 -->
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('+')">+</button>
        
        <!-- Row 6 -->
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('0')" style="grid-column: span 2;">0</button>
        <button onclick="appendValue('.')">.</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    function appendValue(val) {
        display.value += val;
    }

    function clearDisplay() {
        display.value = '';
    }

    function backspace() {
        display.value = display.value.slice(0, -1);
    }

    function scientific(type) {
        try {
            let currentVal = parseFloat(display.value) || 0;
            
            switch(type) {
                case 'sin':
                    display.value = Math.sin(currentVal * Math.PI / 180); // Degrees
                    break;
                case 'cos':
                    display.value = Math.cos(currentVal * Math.PI / 180); // Degrees
                    break;
                case 'tan':
                    display.value = Math.tan(currentVal * Math.PI / 180); // Degrees
                    break;
                case 'log':
                    display.value = Math.log10(currentVal);
                    break;
                case 'sqrt':
                    display.value = Math.sqrt(currentVal);
                    break;
                case 'pi':
                    display.value += Math.PI;
                    break;
                case 'e':
                    display.value += Math.E;
                    break;
            }
        } catch (error) {
            display.value = 'Error';
        }
    }

    function calculate() {
        try {
            // Evaluates mathematical expression strings directly
            let result = eval(display.value);
            // Limit floating point decimals to prevent long overflow numbers
            display.value = Number(result.toFixed(8)).toString();
        } catch (error) {
            display.value = 'Error';
        }
    }
</script>

</body>
</html>
